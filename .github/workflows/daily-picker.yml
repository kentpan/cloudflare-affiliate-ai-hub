name: Daily Affiliate AI Picker

# NOTE: This workflow has TWO jobs:
#   1. `pick`   — runs on schedule + workflow_dispatch. Generates .data/*.json
#                  and commits to main. The commit touches ONLY .data/ files.
#   2. `deploy` — runs on `push` to main, BUT only when the push includes
#                  non-.data files (via `paths-ignore`). This is the deploy
#                  trigger for Cloudflare Pages.
#
# === Path-based CF Pages trigger filtering ===
# The `push` trigger below uses `paths-ignore: ['.data/**']` so that the
# `deploy` job does NOT run when the daily picker commits .data/*.json.
# It ONLY runs when you push code/config changes (non-.data files).
#
# IMPORTANT: For this to actually control CF Pages deployments, you MUST
# disable Cloudflare Pages' automatic git integration in the CF dashboard
# (Settings → Builds & deployments → Disable automatic deployments).
# Otherwise CF Pages will STILL rebuild on every .data/ commit regardless
# of this workflow. Once git integration is disabled, this `deploy` job
# (using wrangler) becomes the sole deploy mechanism.
#
# Required repo Secrets for the deploy job:
#   CLOUDFLARE_API_TOKEN  — API token with Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account ID
# And a repo Variable:
#   CLOUDFLARE_PAGES_PROJECT — Pages project name (e.g. "affiliate-ai-hub")

on:
  schedule:
    # UTC 00:00 = Beijing 08:00 — daily AI selection run
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD, default: today)'
        required: false
        default: ''
      llm_apikey:
        description: 'LLMAI_APIKEY (leave empty to use the repo Secret or heuristic mode)'
        required: false
        default: ''
      use_llm:
        description: 'Use LLM for AI analysis (true|false, default: auto-detect: true if key provided, else false)'
        required: false
        default: ''
  push:
    branches: [main]
    # Only trigger the deploy job when non-.data files change.
    # .data/*.json commits (from the pick job) are ignored.
    # NOTE: we do NOT ignore '**/*.json' globally — that would also skip
    # deploys when package.json / tsconfig.json change.
    paths-ignore:
      - '.data/**'

permissions:
  contents: write
  actions: read

concurrency:
  group: affiliate-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pick:
    # Only run the picker on schedule or manual dispatch — NOT on push.
    # Push events are handled by the `deploy` job below.
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      date: ${{ steps.picker.outputs.date }}
      total: ${{ steps.picker.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node v22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install app deps (shared lib)
        working-directory: .
        run: npm ci || npm install

      - name: Install scripts deps
        working-directory: ./scripts
        run: npm install --no-audit --no-fund

      - name: Typecheck scripts
        working-directory: ./scripts
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || echo "warn: typecheck skipped (non-blocking)"
          fi

      # Run the AI picker — generates .data/{date}/ + pushes to RECEIVE_URL.
      # Cloudflare Pages is deployed separately via CF Git integration
      # (CF auto-detects the .data/ commit and rebuilds the frontend).
      - name: Run AI picker
        working-directory: ./scripts
        id: picker
        env:
          LLMAI_APIKEY: ${{ github.event.inputs.llm_apikey || secrets.LLMAI_APIKEY }}
          LLMAI_BASE_URL: ${{ secrets.LLMAI_BASE_URL }}
          LLMAI_MODEL: ${{ secrets.LLMAI_MODEL }}
          AMZ_ACCESS_KEY: ${{ secrets.AMZ_ACCESS_KEY }}
          AMZ_SECRET_KEY: ${{ secrets.AMZ_SECRET_KEY }}
          AMZ_PARTNER_TAG: ${{ secrets.AMZ_PARTNER_TAG }}
          AMZ_MARKETPLACE: ${{ secrets.AMZ_MARKETPLACE }}
          AMZ_HOST: ${{ secrets.AMZ_HOST }}
          AMZ_REGION: ${{ secrets.AMZ_REGION }}
          TBK_APP_KEY: ${{ secrets.TBK_APP_KEY }}
          TBK_APP_SECRET: ${{ secrets.TBK_APP_SECRET }}
          TBK_ADZONE_ID: ${{ secrets.TBK_ADZONE_ID }}
          TBK_PID: ${{ secrets.TBK_PID }}
          JD_APP_KEY: ${{ secrets.JD_APP_KEY }}
          JD_APP_SECRET: ${{ secrets.JD_APP_SECRET }}
          JD_ACCESS_TOKEN: ${{ secrets.JD_ACCESS_TOKEN }}
          JD_SITE_ID: ${{ secrets.JD_SITE_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          RECEIVE_URL: ${{ secrets.RECEIVE_URL }}
          RECEIVE_TOKEN: ${{ secrets.RECEIVE_TOKEN }}
          PICKER_DATE: ${{ github.event.inputs.date }}
          MANUAL_LLM_KEY: ${{ github.event.inputs.llm_apikey }}
          USE_LLM_INPUT: ${{ github.event.inputs.use_llm }}
        run: |
          set -euo pipefail
          echo "=== Daily Affiliate AI Picker ==="
          echo "Date: ${PICKER_DATE:-today}"

          # Effective LLM key = manual input (if provided) else the Secret env var
          EFFECTIVE_KEY=""
          if [ -n "${MANUAL_LLM_KEY}" ]; then
            EFFECTIVE_KEY="${MANUAL_LLM_KEY}"
            echo "Using manually-input LLMAI_APIKEY"
          elif [ -n "${LLMAI_APIKEY}" ]; then
            EFFECTIVE_KEY="${LLMAI_APIKEY}"
            echo "Using LLMAI_APIKEY from repo Secrets"
          fi

          # Decide LLM mode: explicit use_llm input > auto-detect from key presence
          if [ -n "${USE_LLM_INPUT}" ]; then
            USE_LLM="${USE_LLM_INPUT}"
          elif [ -n "${EFFECTIVE_KEY}" ]; then
            USE_LLM="true"
          else
            USE_LLM="false"
          fi
          echo "Use LLM: ${USE_LLM}"
          if [ "${USE_LLM}" = "false" ]; then
            echo "WARN: No LLMAI_APIKEY provided — using heuristic mode"
          fi

          ARGS=""
          if [ -n "${PICKER_DATE}" ]; then
            ARGS="${ARGS} --date ${PICKER_DATE}"
          fi
          if [ "${USE_LLM}" = "false" ]; then
            ARGS="${ARGS} --no-llm"
          fi

          echo "Running: tsx src/index.ts ${ARGS}"
          npx tsx src/index.ts ${ARGS}

          TARGET_DATE="${PICKER_DATE:-$(date -u +%F)}"
          SUMMARY_FILE="../.data/${TARGET_DATE}/summary.json"
          if [ ! -f "${SUMMARY_FILE}" ]; then
            echo "ERROR: summary.json not generated at ${SUMMARY_FILE}"
            exit 1
          fi
          echo "summary.json generated"
          TOTAL=$(jq -r '.totalCount // 0' "${SUMMARY_FILE}")
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"
          echo "Total picks: ${TOTAL}"

      - name: Health check
        working-directory: ./scripts
        run: |
          set -euo pipefail
          TARGET_DATE="${{ steps.picker.outputs.date }}"
          DATA_DIR="../.data/${TARGET_DATE}"
          echo "Health check for ${TARGET_DATE}"
          for f in summary.json amazon.json taobao.json jd.json google.json; do
            if [ ! -f "${DATA_DIR}/${f}" ]; then
              echo "ERROR: Missing ${f}"
              exit 1
            fi
          done
          for d in by-platform by-category by-commission by-price-range; do
            if [ ! -f "${DATA_DIR}/dimensions/${d}.json" ]; then
              echo "ERROR: Missing dimensions/${d}.json"
              exit 1
            fi
          done
          [ -f "../.data/index.json" ] || { echo "ERROR: index.json missing"; exit 1; }
          jq -r '"Total: \(.totalCount) | AvgScore: \(.avgScore) | Revenue: \(.totalExpectedRevenue)"' "${DATA_DIR}/summary.json"

      - name: Upload .data artifact
        uses: actions/upload-artifact@v4
        with:
          name: affiliate-data-${{ steps.picker.outputs.date }}
          path: .data/
          retention-days: 90

      # Commit .data/ to main. This commit touches ONLY .data/** files, so
      # the `push` trigger's `paths-ignore: ['.data/**']` filter will prevent
      # the `deploy` job from running. CF Pages (if git integration is
      # disabled per the workflow header instructions) will also NOT rebuild.
      - name: Commit .data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .data/
          git commit -m "chore(data): daily pick ${{ steps.picker.outputs.date }} (${{ steps.picker.outputs.total }} items) [skip deploy]" || echo "no changes to commit"
          git push || echo "push failed (possibly no changes)"

      - name: Summary
        run: |
          echo "### Daily Affiliate AI Picker Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Date**: ${{ steps.picker.outputs.date }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Total picks**: ${{ steps.picker.outputs.total }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact**: affiliate-data-${{ steps.picker.outputs.date }} (90-day retention)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **RECEIVE_URL**: pushed if configured" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Deploy**: skipped (.data/** commits excluded by paths-ignore)" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────────────────
  # Deploy job — runs ONLY on push events where non-.data files changed.
  # This is the path-filtered Cloudflare Pages deploy mechanism.
  #
  # Prerequisite: Disable CF Pages automatic git integration in the CF
  # dashboard, otherwise CF Pages will still rebuild on every .data/ commit
  # regardless of this paths-ignore filter.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check if CF Pages secrets are configured
        id: cf_check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          if [ -n "${CF_TOKEN}" ] && [ -n "${CF_ACCOUNT}" ] && [ -n "${CF_PROJECT}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✓ CF Pages secrets configured — will deploy to project: ${CF_PROJECT}"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠ CF Pages secrets not configured — skipping deploy (build only)"
          fi

      - name: Setup Node v22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_GIT_REPO: ${{ github.repository }}
          NEXT_PUBLIC_DATA_URL: https://raw.githubusercontent.com/${{ github.repository }}/main

      - name: Build for Cloudflare Pages
        if: ${{ steps.cf_check.outputs.configured == 'true' }}
        run: npx @cloudflare/next-on-pages@1

      # Set the nodejs_compat compatibility flag on the CF Pages project.
      # @cloudflare/next-on-pages output uses Node.js APIs (Buffer, process,
      # stream, etc.) that require this flag in the Workers runtime.
      # Without it, the deployed site throws: "Node.JS Compatibility Error:
      # no nodejs_compat compatibility flag set".
      # This API call is idempotent — safe to run on every deploy.
      - name: Set nodejs_compat flag on CF Pages project
        if: ${{ steps.cf_check.outputs.configured == 'true' }}
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          echo "Setting nodejs_compat compatibility flag on project: ${CF_PROJECT}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/pages/projects/${CF_PROJECT}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{
              "deployment_configs": {
                "production": {
                  "compatibility_flags": ["nodejs_compat"]
                },
                "preview": {
                  "compatibility_flags": ["nodejs_compat"]
                }
              }
            }')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP status: ${HTTP_CODE}"
          if echo "$BODY" | jq -e '.success == true' > /dev/null 2>&1; then
            echo "✓ nodejs_compat flag set successfully"
            echo "$BODY" | jq -r '.result.deployment_configs.production.compatibility_flags // [] | join(", ")' | xargs -I{} echo "  Production flags: {}"
            echo "$BODY" | jq -r '.result.deployment_configs.preview.compatibility_flags // [] | join(", ")' | xargs -I{} echo "  Preview flags: {}"
          else
            echo "⚠ Failed to set compatibility flag:"
            echo "$BODY" | jq '.errors // .' 2>/dev/null || echo "$BODY"
            echo "Continuing — you may need to set it manually in CF dashboard"
          fi

      - name: Deploy to Cloudflare Pages
        if: ${{ steps.cf_check.outputs.configured == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }}

      - name: Deploy Summary
        if: ${{ always() }}
        run: |
          echo "### Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger**: push to ${{ github.ref_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit**: ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CF Pages deploy**: ${{ steps.cf_check.outputs.configured == 'true' && '✓ deployed' || '⤵ skipped (secrets not configured, build-only)' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **nodejs_compat flag**: set via CF API (production + preview)" >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    runs-on: ubuntu-latest
    needs: [pick]
    if: ${{ failure() }}
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Picker failed — ${date}`,
              body: [
                `The daily affiliate AI picker workflow failed on ${date}.`,
                ``,
                `[View failed run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                ``,
                `**Common causes:**`,
                `- LLM concurrency limit (retry 3s x 10 already configured)`,
                `- Missing GitHub Secrets (LLMAI_APIKEY required for AI mode)`,
                `- Affiliate API credentials expired`,
                ``,
                `Please check the workflow logs and re-run manually after fixing.`,
              ].join('\n'),
              labels: ['bug', 'auto-generated', 'daily-picker']
            });
