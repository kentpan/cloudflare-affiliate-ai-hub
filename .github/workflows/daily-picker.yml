name: Daily Affiliate AI Picker

on:
  schedule:
    # UTC 00:00 = Beijing 08:00 — daily AI selection run
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger with optional date / LLM key / use_llm override
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD, default: today)'
        required: false
        default: ''
      llm_apikey:
        description: 'LLMAI_APIKEY (leave empty to use the repo Secret or heuristic mode)'
        required: false
        default: ''
      use_llm:
        description: 'Use LLM for AI analysis (true|false, default: auto-detect: true if key provided, else false)'
        required: false
        default: ''

permissions:
  contents: write
  actions: read

jobs:
  pick:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            scripts/package-lock.json

      # Install Bun (faster than npm for this monorepo)
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Install the web app deps first (the scripts package reuses the shared
      # affiliate library from ../web/src/lib/affiliate/).
      - name: Install web deps (shared lib)
        working-directory: ./web
        run: bun install --frozen-lockfile || bun install

      - name: Install scripts deps
        working-directory: ./scripts
        run: bun install --frozen-lockfile || bun install

      # Build the scripts package (tsx needs to resolve the shared lib)
      - name: Typecheck scripts
        working-directory: ./scripts
        run: |
          if [ -f tsconfig.json ]; then
            npx tsc --noEmit || echo "warn: typecheck skipped (non-blocking)"
          fi

      # Run the AI picker with LLM concurrency-limit retry (3s × 10, configured
      # in web/src/lib/affiliate/config.ts → config.llmRetry).
      # The picker writes results to ../.data/{date}/.
      - name: Run AI picker
        working-directory: ./scripts
        id: picker
        env:
          # LLMAI_APIKEY: manual input takes precedence over the repo Secret
          LLMAI_APIKEY: ${{ github.event.inputs.llm_apikey || secrets.LLMAI_APIKEY }}
          LLMAI_BASE_URL: ${{ secrets.LLMAI_BASE_URL }}
          LLMAI_MODEL: ${{ secrets.LLMAI_MODEL }}
          AMZ_ACCESS_KEY: ${{ secrets.AMZ_ACCESS_KEY }}
          AMZ_SECRET_KEY: ${{ secrets.AMZ_SECRET_KEY }}
          AMZ_PARTNER_TAG: ${{ secrets.AMZ_PARTNER_TAG }}
          AMZ_MARKETPLACE: ${{ secrets.AMZ_MARKETPLACE }}
          AMZ_HOST: ${{ secrets.AMZ_HOST }}
          AMZ_REGION: ${{ secrets.AMZ_REGION }}
          TBK_APP_KEY: ${{ secrets.TBK_APP_KEY }}
          TBK_APP_SECRET: ${{ secrets.TBK_APP_SECRET }}
          TBK_ADZONE_ID: ${{ secrets.TBK_ADZONE_ID }}
          TBK_PID: ${{ secrets.TBK_PID }}
          JD_APP_KEY: ${{ secrets.JD_APP_KEY }}
          JD_APP_SECRET: ${{ secrets.JD_APP_SECRET }}
          JD_ACCESS_TOKEN: ${{ secrets.JD_ACCESS_TOKEN }}
          JD_SITE_ID: ${{ secrets.JD_SITE_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          RECEIVE_URL: ${{ secrets.RECEIVE_URL }}
          RECEIVE_TOKEN: ${{ secrets.RECEIVE_TOKEN }}
          # Custom date override (workflow_dispatch only)
          PICKER_DATE: ${{ github.event.inputs.date }}
          # Manual LLM key input (workflow_dispatch only; takes precedence over Secret)
          MANUAL_LLM_KEY: ${{ github.event.inputs.llm_apikey }}
          # Auto-detect: use LLM only if a key is available (manual input or Secret);
          # otherwise fall back to heuristic mode (zero-config — runs without any secrets).
          USE_LLM_INPUT: ${{ github.event.inputs.use_llm }}
        run: |
          set -euo pipefail
          echo "=== Daily Affiliate AI Picker ==="
          echo "Date: ${PICKER_DATE:-today}"

          # Effective LLM key = manual input (if provided) else the Secret env var
          EFFECTIVE_KEY=""
          if [ -n "${MANUAL_LLM_KEY}" ]; then
            EFFECTIVE_KEY="${MANUAL_LLM_KEY}"
            echo "🔑 Using manually-input LLMAI_APIKEY"
          elif [ -n "${LLMAI_APIKEY}" ]; then
            EFFECTIVE_KEY="${LLMAI_APIKEY}"
            echo "🔑 Using LLMAI_APIKEY from repo Secrets"
          fi

          # Decide LLM mode: explicit use_llm input > auto-detect from key presence
          if [ -n "${USE_LLM_INPUT}" ]; then
            USE_LLM="${USE_LLM_INPUT}"
          elif [ -n "${EFFECTIVE_KEY}" ]; then
            USE_LLM="true"
          else
            USE_LLM="false"
          fi
          echo "Use LLM: ${USE_LLM}"
          if [ "${USE_LLM}" = "false" ]; then
            echo "⚠️  No LLMAI_APIKEY provided (manual input or Secret) — using heuristic mode"
            echo "    Tip: re-run with workflow_dispatch and fill the llm_apikey field, or add the LLMAI_APIKEY repo Secret"
          fi

          # Run with optional date + useLlm flags
          ARGS=""
          if [ -n "${PICKER_DATE}" ]; then
            ARGS="${ARGS} --date ${PICKER_DATE}"
          fi
          if [ "${USE_LLM}" = "false" ]; then
            ARGS="${ARGS} --no-llm"
          fi

          echo "Running: tsx src/index.ts ${ARGS}"
          npx tsx src/index.ts ${ARGS}

          # Verify output exists
          TARGET_DATE="${PICKER_DATE:-$(date -u +%F)}"
          SUMMARY_FILE="../.data/${TARGET_DATE}/summary.json"
          if [ ! -f "${SUMMARY_FILE}" ]; then
            echo "❌ ERROR: summary.json not generated at ${SUMMARY_FILE}"
            exit 1
          fi
          echo "✅ summary.json generated"
          # Extract total count for the step output
          TOTAL=$(jq -r '.totalCount // 0' "${SUMMARY_FILE}")
          echo "total=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "date=${TARGET_DATE}" >> "$GITHUB_OUTPUT"
          echo "✅ Total picks: ${TOTAL}"

      # Health check: validate the generated data structure
      - name: Health check
        working-directory: ./scripts
        run: |
          set -euo pipefail
          TARGET_DATE="${{ steps.picker.outputs.date }}"
          DATA_DIR="../.data/${TARGET_DATE}"
          echo "=== Health check for ${TARGET_DATE} ==="

          # Required files
          REQUIRED_FILES="summary.json amazon.json taobao.json jd.json google.json"
          for f in ${REQUIRED_FILES}; do
            if [ ! -f "${DATA_DIR}/${f}" ]; then
              echo "❌ Missing: ${f}"
              exit 1
            fi
            echo "✅ ${f} exists"
          done

          # Dimensions
          for d in by-platform by-category by-commission by-price-range; do
            if [ ! -f "${DATA_DIR}/dimensions/${d}.json" ]; then
              echo "❌ Missing: dimensions/${d}.json"
              exit 1
            fi
          done
          echo "✅ All dimension files exist"

          # Index updated
          if [ ! -f "../.data/index.json" ]; then
            echo "❌ index.json missing"
            exit 1
          fi
          echo "✅ index.json updated"

          # Summary stats
          jq -r '"Total: \(.totalCount) | AvgScore: \(.avgScore) | Revenue: \(.totalExpectedRevenue)"' "${DATA_DIR}/summary.json"

      # Upload .data as artifact (90-day retention for debugging)
      - name: Upload .data artifact
        uses: actions/upload-artifact@v4
        with:
          name: affiliate-data-${{ steps.picker.outputs.date }}
          path: .data/
          retention-days: 90
          compression-level: 6

      # Commit .data back to repo (triggers Pages rebuild)
      - name: Commit .data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .data/
          git commit -m "chore(data): daily pick ${{ steps.picker.outputs.date }} (${{ steps.picker.outputs.total }} items)" || echo "no changes to commit"
          git push || echo "push failed (possibly no changes)"

      # Summary in the Actions log
      - name: Summary
        run: |
          echo "### 🎯 Daily Affiliate AI Picker Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Date**: ${{ steps.picker.outputs.date }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Total picks**: ${{ steps.picker.outputs.total }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **LLM used**: ${{ github.event.inputs.use_llm || 'true' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact**: affiliate-data-${{ steps.picker.outputs.date }} (90-day retention)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "View full data in the uploaded artifact or the committed \`.data/\` directory." >> "$GITHUB_STEP_SUMMARY"

  # Failure notification job — runs if pick fails
  notify-failure:
    runs-on: ubuntu-latest
    needs: pick
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Daily Picker failed — ${date}`,
              body: [
                `The daily affiliate AI picker workflow failed on ${date}.`,
                ``,
                `[View failed run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                ``,
                `**Common causes:**`,
                `- LLM concurrency limit (retry 3s × 10 already configured)`,
                `- Missing GitHub Secrets (LLMAI_APIKEY required)`,
                `-联盟 API credentials expired`,
                ``,
                `Please check the workflow logs and re-run manually after fixing.`,
              ].join('\n'),
              labels: ['bug', 'auto-generated', 'daily-picker']
            });
            console.log('Failure issue created');
